stages:
  - build
  - test

variables:
  # This is the "magic" fix for service connectivity issues in GitLab CI
  FF_NETWORK_PER_BUILD: "true"
  SQLX_OFFLINE: "true"

# Reusable Postgres config
.postgres_service: &postgres_config
  services:
    - name: postgres:16
      alias: postgres
  variables:
    POSTGRES_DB: doodoo_test
    POSTGRES_USER: postgres
    POSTGRES_PASSWORD: postgres
    DATABASE_URL: postgres://postgres:postgres@postgres:5432/doodoo_test

build:
  stage: build
  image: rust:1.95
  script:
    - cargo build --verbose

unit_tests:
  stage: test
  image: rust:1.95
  script:
    # Run only unit tests (fast, no DB)
    - cargo test --bins --verbose

integration_tests:
  <<: *postgres_config
  stage: test
  image: rust:1.95
  variables:
    SQLX_OFFLINE: "false"
  script:
    - apt-get update && apt-get install -y netcat-openbsd
    - echo "Waiting for database at postgres:5432..."
    - until nc -z postgres 5432; do echo "waiting for db..."; sleep 1; done
    - echo "Database is UP"
    # Run only integration tests with a single thread to prevent connection race conditions
    - cargo test --test '*' --verbose -- --test-threads=1