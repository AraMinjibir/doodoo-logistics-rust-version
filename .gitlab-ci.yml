stages:
  - check
  - test
  - build

variables:
  CARGO_TERM_COLOR: always
  SQLX_OFFLINE: "true"
  # Force cargo to look in the right home directory for binaries
  CARGO_HOME: "$CI_PROJECT_DIR/.cargo" 

cache:
  key: "$CI_COMMIT_REF_SLUG"
  paths:
    - target/
    - .cargo/

# 1. CHECK (fast validation)
check:
  image: rust:1.96
  stage: check
  before_script:
    - rustup toolchain install 1.96 --component rustfmt clippy
    - rustup default 1.96
  script:
    - cargo fmt -- --check
    - cargo clippy -- -D warnings
    - cargo check

# 2. TEST (Pinned to 1.96 to match check stage)
test:
  image: rust:1.96
  stage: test
  script:
    - cargo test --all

# 3. BUILD (release check)
build:
  image: rust:1.96
  stage: build
  script:
    - cargo build --release