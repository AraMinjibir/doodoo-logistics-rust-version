stages:
  - build
  - test

# 1. BUILD STAGE

build:
  image: rust:1.95
  stage: build
  script:
    - cargo build --verbose


# 2. UNIT TESTS (BUSINESS LOGIC)

unit_tests:
  image: rust:1.95
  stage: test
  script:
    - cargo test --verbose



# 3. INTEGRATION TESTS (REAL DB)

integration_tests:
  image: rust:1.95
  stage: test

  services:
    - name: postgres:16
      alias: postgres

  variables:
    POSTGRES_DB: doodoo_test
    POSTGRES_USER: postgres
    POSTGRES_PASSWORD: postgres

  script:
    -  echo "DATABASE_URL=$DATABASE_URL"
    - cargo test test  --verbose

  #  for debugging CI failures
  artifacts:
    when: always
    reports:
      junit: target/junit.xml
      