stages:
  - build
  - test

variables:
  # CRITICAL: This flag allows the Runner container and Service container to talk to each other.
  FF_NETWORK_PER_BUILD: "true" 
  SQLX_OFFLINE: "true" # Default to offline for build and unit tests

# Reusable Postgres config
.postgres_service: &postgres_config
  services:
    - name: postgres:16
      alias: postgres
  variables:
    POSTGRES_DB: doodoo_test
    POSTGRES_USER: postgres
    POSTGRES_PASSWORD: postgres
    DATABASE_URL: postgres://postgres:postgres@postgres:5432/doodoo_test

build:
  stage: build
  image: rust:1.95
  script:
    - cargo build --verbose

unit_tests:
  stage: test
  image: rust:1.95
  script:
    # We run only library unit tests here to avoid hitting DB-dependent integration tests
    - cargo test --lib --verbose 

integration_tests:
  <<: *postgres_config
  stage: test
  image: rust:1.95
  variables:
    SQLX_OFFLINE: "false" # We want live validation for integration tests
  script:
    - echo "Waiting for Postgres to accept connections at postgres:5432..."
    - apt-get update && apt-get install -y netcat-openbsd
    # This loop should now succeed quickly with the FF_NETWORK_PER_BUILD flag enabled
    - until nc -z postgres 5432; do echo "waiting for db..."; sleep 1; done
    - echo "DB is ready!"
    # Run only the integration tests
    - cargo test --test '*' --verbose