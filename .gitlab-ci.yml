stages:
  - check
  - test
  - build

variables:
  CARGO_TERM_COLOR: always
  SQLX_OFFLINE: "true"

cache:
  key: "$CI_COMMIT_REF_SLUG"
  paths:
    - target/

# 1. CHECK (fast validation)
check:
  image: rust:1.96
  stage: check
  before_script:
    # Force the shell to find the absolute path where rustup drops binaries
    - export PATH="/usr/local/rustup/toolchains/1.96.0-x86_64-unknown-linux-gnu/bin:$PATH"
    - rustup component add rustfmt clippy
  script:
    - cargo fmt -- --check
    - cargo clippy -- -D warnings
    - cargo check

# 2. TEST
test:
  image: rust:1.96
  stage: test
  script:
    - cargo test --all

# 3. BUILD
build:
  image: rust:1.96
  stage: build
  script:
    - cargo build --release