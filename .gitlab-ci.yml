stages:
  - build
  - test

variables:
  # Essential for GitLab SaaS runners to link the Rust container and Postgres container
  FF_NETWORK_PER_BUILD: "true"
  # Default Database URL for CI
  DATABASE_URL: "postgres://postgres:postgres@postgres:5432/doodoo_test"
  SQLX_OFFLINE: "true"

build:
  stage: build
  image: rust:1.95
  script:
    - cargo build --verbose

unit_tests:
  stage: test
  image: rust:1.95
  script:
    # Runs unit tests (ignoring the /tests folder)
    - cargo test --bins --verbose

integration_tests:
  stage: test
  image: rust:1.95
  services:
    - name: postgres:16
      alias: postgres
  variables:
    POSTGRES_DB: doodoo_test
    POSTGRES_USER: postgres
    POSTGRES_PASSWORD: postgres
    SQLX_OFFLINE: "false"
  script:
    - apt-get update && apt-get install -y netcat-openbsd
    # Verification of network resolution
    - echo "Waiting for database at host 'postgres'..."
    - until nc -z postgres 5432; do echo "waiting for db..."; sleep 1; done
    - echo "Database is UP"
    # Execute integration tests only
    - cargo test --test '*' --verbose -- --test-threads=1