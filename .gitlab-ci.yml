stages:
  - check
  - test
  - build

variables:
  CARGO_TERM_COLOR: always
  SQLX_OFFLINE: "true"
  # Override CARGO_HOME to ensure cached components are stored and readable in the workspace
  CARGO_HOME: "$CI_PROJECT_DIR/.cargo"

cache:
  key: "$CI_COMMIT_REF_SLUG"
  paths:
    - target/
    - .cargo/

# 1. CHECK (fast validation)
check:
  image: rust:1.96
  stage: check
  before_script:
    # Ensure the PATH includes our local cargo home bin directory
    export PATH="$CARGO_HOME/bin:$PATH"
    # Explicitly add the components to the currently active toolchain
    - rustup component add rustfmt --toolchain 1.96.0-x86_64-unknown-linux-gnu
    - rustup component add clippy --toolchain 1.96.0-x86_64-unknown-linux-gnu
  script:
    - cargo fmt -- --check
    - cargo clippy -- -D warnings
    - cargo check

# 2. TEST
test:
  image: rust:1.96
  stage: test
  script:
    - cargo test --all

# 3. BUILD
build:
  image: rust:1.96
  stage: build
  script:
    - cargo build --release