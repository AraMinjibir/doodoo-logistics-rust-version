stages:
  - build
  - test

# 1. BUILD STAGE

build:
  image: rust:1.95
  stage: build
  script:
    - cargo build --verbose


# 2. UNIT TESTS (BUSINESS LOGIC)

unit_tests:
  image: rust:1.95
  stage: test
  script:
    - cargo test --lib --verbose



# 3. INTEGRATION TESTS (REAL DB)

integration_tests:
  image: rust:1.95
  stage: test

  services:
    - name: postgres:16
      alias: postgres

  variables:
    POSTGRES_DB: doodoo_test
    POSTGRES_USER: postgres
    POSTGRES_PA.SSWORD: postgres
    DATABASE_URL: "postgres://postgres:postgres@postgres:5432/doodoo_test"

  script:
    - apt-get update && apt-get install -y postgresql-client
    - cargo test --test integration --verbose

  #  for debugging CI failures
  artifacts:
    when: always
    reports:
      junit: target/junit.xml